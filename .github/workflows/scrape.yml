name: Lubbock Motivated Seller Scraper

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'How many days back to search (default 7, use 90 for historical pull)'
        required: false
        default: '7'
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run scraper
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: python scraper/fetch.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv || true
          git diff --cached --quiet || git commit -m "chore: update records $(date -u '+%Y-%m-%d %H:%M UTC') [${LOOKBACK_DAYS}d]"
          git push
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
